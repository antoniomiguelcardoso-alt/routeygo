<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routeygo - Planeamento de Itinerários Inteligentes</title>
    <style>
        :root {
            --bg-dark: #0b0f19;
            --bg-card: #151f32;
            --bg-input: #1e293b;
            --primary: #10b981;
            --primary-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .wrapper {
            width: 100%;
            max-width: 650px;
            padding: 20px;
            box-sizing: border-box;
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            letter-spacing: -0.05em;
        }

        .brand p {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.05rem;
        }

        .main-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.5);
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"], select {
            width: 100%;
            padding: 14px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .btn-submit:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .status-message {
            margin-top: 25px;
            text-align: center;
            font-weight: 500;
            color: var(--primary);
            display: none;
        }

        .result-panel {
            margin-top: 30px;
            background-color: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 25px;
            display: none;
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="brand">
            <h1>Routeygo 🎒</h1>
            <p>Gere roteiros personalizados e otimizados instantaneamente</p>
        </div>

        <div class="main-card">
            <div class="form-group">
                <label for="destino">Destino pretendido</label>
                <input type="text" id="destino" placeholder="Ex: Vigo, Guimarães, Chaves..." required>
            </div>

            <div class="form-group">
                <label for="dias">Duração da Estadia</label>
                <select id="dias">
                    <option value="1">1 Dia</option>
                    <option value="2">2 Dias</option>
                    <option value="3">3 Dias</option>
                    <option value="5">5 Dias</option>
                    <option value="7">1 Semana</option>
                </select>
            </div>

            <div class="form-group">
                <label for="estilo">Foco do Itinerário</label>
                <select id="estilo">
                    <option value="fotografia de paisagem e arquitetura tradicional de pedra">Fotografia (Paisagem & Arquitetura)</option>
                    <option value="património cultural, monumentos e história medieval">Cultural & Histórico</option>
                    <option value="gastronomia local, vinhos e pontos de lazer">Gastronómico & Lazer</option>
                    <option value="trilhos, natureza e exploração ao ar livre">Natureza & Aventura</option>
                </select>
            </div>

            <button id="btnGerar" class="btn-submit">Criar Roteiro Personalizado</button>

            <div id="status" class="status-message">A processar o pedido com os servidores Gemini...</div>
            <div id="resultado" class="result-panel"></div>
        </div>
    </div>

    <script>
        document.getElementById('btnGerar').addEventListener('click', async () => {
            const destino = document.getElementById('destino').value.trim();
            const dias = document.getElementById('dias').value;
            const estilo = document.getElementById('estilo').value;
            
            const btn = document.getElementById('btnGerar');
            const statusDiv = document.getElementById('status');
            const resDiv = document.getElementById('resultado');

            if (!destino) {
                alert('Por favor, introduza um destino válido.');
                return;
            }

            // Bloquear UI durante a geração
            btn.disabled = true;
            statusDiv.style.display = 'block';
            resDiv.style.display = 'none';
            statusDiv.innerText = 'A estruturar plano de viagem com o Gemini 2.0 Flash...';

            // Construção inteligente do prompt
            const promptFinal = `Gera um itinerário completo e detalhado de ${dias} dia(s) para viajar em ${destino}. O plano deve ser focado especificamente em ${estilo}. Inclui sugestões de locais exatos para visitar e dicas de logística.`;

            try {
                const response = await fetch('/api/claude', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptFinal })
                });
                
                const data = await response.json();
                
                statusDiv.style.display = 'none';
                btn.disabled = false;
                resDiv.style.display = 'block';

                if (data.text) {
                    resDiv.innerText = data.text;
                } else if (data.error) {
                    resDiv.innerHTML = `<span style="color: #ef4444; font-weight: bold;">Limite de Chave Atingido:</span><br><br>O site está operacional, mas a cota diária gratuita da chave API da Google foi esgotada. Por favor, tente novamente amanhã ou atualize o plano no Google AI Studio.`;
                } else {
                    resDiv.innerText = 'Resposta inesperada do servidor backend.';
                }
            } catch (err) {
                statusDiv.style.display = 'none';
                btn.disabled = false;
                resDiv.style.display = 'block';
                resDiv.innerText = 'Erro de rede ao contactar a API: ' + err.message;
            }
        });
    </script>
</body>
</html>
